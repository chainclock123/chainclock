<!-- ══════════════════════════════════════════════════════════
     NOSTR-SPECIFIC NOTES
     ══════════════════════════════════════════════════════════

     Nostr clients (Damus, Primal, Amethyst, Snort, Coracle,
     Nostrudel, etc.) render link previews by fetching the URL
     and reading OG + Twitter Card meta tags — the SAME tags
     above. There is no separate "nostr:" meta namespace.

     What matters for Nostr link previews:

     1. og:image + twitter:image   → the preview card image
        ✓ Use 1200×630 (same as OG standard)
        ✓ Must be an absolute URL (https://...)
        ✓ Must be publicly accessible (no auth, no CORS block)
        ✓ PNG or JPG under 5MB

     2. og:title + twitter:title   → bold headline in preview
     3. og:description + twitter:description → body text

     4. Content-Type header must be text/html
        (some SPAs serve application/json for the shell —
         Nostr clients won't parse that)

     5. Server-Side Rendering (SSR) or Static HTML:
        Most Nostr clients do NOT execute JavaScript.
        If your site is a pure client-side SPA (React/Vite),
        meta tags injected by JS won't be seen.
        Solutions:
          a) Pre-render your index.html with the meta tags
             baked into the static HTML (easiest — just paste
             these tags directly into index.html)
          b) Use a prerender service (prerender.io, Rendertron)
          c) SSR framework (Next.js, Remix, Astro)

     6. CORS: Nostr relay-based clients fetch your page
        server-side, but some web clients (Snort, Coracle)
        fetch from the browser. Consider adding:
  -->
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
